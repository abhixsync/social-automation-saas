  <rect x="120" y="368" width="24" height="24" rx="12" fill="#a855f7"/>
  <text x="132" y="385" font-family="system-ui,-apple-system,sans-serif" font-size="14" fill="white" text-anchor="middle">✓</text>
  <text x="164" y="386" font-family="system-ui,-apple-system,sans-serif" font-size="28" fill="#ede9fe">3,000 AI credits / month</text>

  <rect x="120" y="432" width="24" height="24" rx="12" fill="#a855f7"/>
  <text x="132" y="449" font-family="system-ui,-apple-system,sans-serif" font-size="14" fill="white" text-anchor="middle">✓</text>
  <text x="164" y="450" font-family="system-ui,-apple-system,sans-serif" font-size="28" fill="#ede9fe">~600 LinkedIn posts / month</text>

  <rect x="120" y="496" width="24" height="24" rx="12" fill="#a855f7"/>
  <text x="132" y="513" font-family="system-ui,-apple-system,sans-serif" font-size="14" fill="white" text-anchor="middle">✓</text>
  <text x="164" y="514" font-family="system-ui,-apple-system,sans-serif" font-size="28" fill="#ede9fe">5 LinkedIn accounts</text>

  <rect x="120" y="560" width="24" height="24" rx="12" fill="#a855f7"/>
  <text x="132" y="577" font-family="system-ui,-apple-system,sans-serif" font-size="14" fill="white" text-anchor="middle">✓</text>
  <text x="164" y="578" font-family="system-ui,-apple-system,sans-serif" font-size="28" fill="#ede9fe">Priority scheduling</text>

  <rect x="120" y="624" width="24" height="24" rx="12" fill="#a855f7"/>
  <text x="132" y="641" font-family="system-ui,-apple-system,sans-serif" font-size="14" fill="white" text-anchor="middle">✓</text>
  <text x="164" y="642" font-family="system-ui,-apple-system,sans-serif" font-size="28" fill="#ede9fe">Claude Sonnet (best quality)</text>

  <!-- Brand -->
