<svg xmlns="http://www.w3.org/2000/svg" width="800" height="800" viewBox="0 0 800 800">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0533"/>
      <stop offset="100%" style="stop-color:#2d1457"/>
    </linearGradient>
    <linearGradient id="badge" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a855f7"/>
      <stop offset="100%" style="stop-color:#ec4899"/>
    </linearGradient>
  </defs>

  <rect width="800" height="800" fill="url(#bg)" rx="32"/>
  <line x1="0" y1="266" x2="800" y2="266" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="0" y1="533" x2="800" y2="533" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="266" y1="0" x2="266" y2="800" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="533" y1="0" x2="533" y2="800" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>
  <circle cx="400" cy="300" r="260" fill="#a855f7" fill-opacity="0.12"/>

