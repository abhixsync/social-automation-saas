  <rect x="556" y="0" width="244" height="244" fill="#a855f7" fill-opacity="0.15" transform="rotate(45 556 0)"/>
  <text x="692" y="56" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" fill="#e879f9" text-anchor="middle" transform="rotate(45 692 56)" letter-spacing="1">MOST POPULAR</text>

