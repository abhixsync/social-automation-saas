name: CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  # ── Next.js app checks ────────────────────────────────────────────────────────
  app:
    name: App — type-check & lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: postgresql://placeholder/placeholder

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

  # ── Worker checks ─────────────────────────────────────────────────────────────
  worker:
    name: Worker — type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: worker/package-lock.json

      - run: npm ci
        working-directory: worker

      - name: Type check worker
        run: npx tsc --noEmit
        working-directory: worker

  # ── DB migrations (main branch only) ─────────────────────────────────────────
  migrate:
    name: Migrate DB
    runs-on: ubuntu-latest
    needs: [app, worker]
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Run migrations
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
